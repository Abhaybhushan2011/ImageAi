<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bharat AI Image Generator</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #3b82f6; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { background: var(--card); padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 100%; max-width: 500px; text-align: center; }
        h1 { margin-top: 0; font-size: 1.8rem; color: #60a5fa; }
        p { font-size: 0.95rem; color: #94a3b8; margin-bottom: 20px; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #475569; border-radius: 8px; background: #0f172a; color: white; font-size: 1rem; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--primary); }
        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #2563eb; }
        button:disabled { background: #475569; cursor: not-allowed; }
        .result-box { margin-top: 25px; min-height: 350px; border: 2px dashed #475569; border-radius: 8px; display: flex; justify-content: center; align-items: center; overflow: hidden; background: #0f172a; }
        .result-box img { max-width: 100%; border-radius: 6px; display: none; }
        .loader { display: none; border: 4px solid #1e293b; border-top: 4px solid var(--primary); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bharat Softwares AI</h1>
        <p>Type a prompt to generate an image</p>
        
        <input type="text" id="promptInput" placeholder="e.g., A futuristic flying car...">
        <button id="generateBtn" onclick="generateImage()">Generate AI Image</button>

        <div class="result-box">
            <div class="loader" id="loader"></div>
            <img id="resultImage" alt="Generated AI Image">
            <span id="placeholderText" style="color: #94a3b8;">Image will appear here</span>
        </div>
    </div>

    <script>
        // Vercel auto-routes the API, so we just use /api/generate
        async function generateImage() {
            const prompt = document.getElementById('promptInput').value;
            const btn = document.getElementById('generateBtn');
            const loader = document.getElementById('loader');
            const img = document.getElementById('resultImage');
            const placeholder = document.getElementById('placeholderText');

            if (!prompt) return alert("Please enter a prompt!");

            btn.disabled = true;
            btn.innerText = "Creating Masterpiece...";
            img.style.display = 'none';
            placeholder.style.display = 'none';
            loader.style.display = 'block';

            try {
                // Hum direct relative link use kar rahe hain
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });

                const data = await response.json();

                if (response.ok) {
                    img.src = data.image;
                    img.style.display = 'block';
                } else {
                    alert("API Error: " + data.error);
                    placeholder.style.display = 'block';
                }
            } catch (error) {
                console.error("Error:", error);
                alert("Server connection failed.");
                placeholder.style.display = 'block';
            } finally {
                loader.style.display = 'none';
                btn.disabled = false;
                btn.innerText = "Generate AI Image";
            }
        }
    </script>
</body>
</html>
